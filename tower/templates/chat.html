<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- AEDELGARD-BRAND: body's local chat UI. Branded for the Aedelgard product
         (the body is the product). Galadriel remains the name of the open engine
         and of the harness's own agent identity — not of this shipped shell.
         When the hard fork (B) lands, this whole template lifts out cleanly. -->
    <title>Aedelgard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container chat-container">
        <header>
            <h1>Aedelgard</h1>
            <p class="subtitle">Your mind, running on your own machine.<!--
              The dream whisper: a quiet moon + count, no label, no tooltip.
              It appears only once the mind has dreamed (count > 0). The whole
              point is DISCOVERY — a curious user notices the number and asks
              what it means; the mind then tells them, in conversation. We never
              explain it on screen. Encounter, not shortcut.
           --><span id="dream-moon" class="dream-moon" hidden></span></p>
            <div class="header-actions">
                <a href="/" class="btn btn-small">Tower</a>
                <button onclick="clearChat()" class="btn btn-small btn-danger">Clear History</button>
            </div>
        </header>

        <div id="chat-log" class="chat-log"></div>

        <form id="chat-form" class="chat-form" onsubmit="sendMessage(event)">
            <textarea
                id="chat-input"
                class="chat-input"
                placeholder="Speak your mind…"
                rows="2"
                onkeydown="handleKey(event)"
            ></textarea>
            <button type="submit" class="btn" id="send-btn">Send</button>
        </form>
    </div>

    <script>
    const chatLog = document.getElementById('chat-log');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');

    // The assistant's display label. The product shell speaks as "Aedelgard";
    // when the soul-name is plumbed through (post-fork), this becomes dynamic.
    const ASSISTANT_LABEL = 'Aedelgard';

    // The dream whisper — fetch the count, reveal the moon only if the mind has
    // dreamed. Content is NEVER shown here; if the user is curious about the
    // number, they ask, and the mind tells them in conversation.
    (async () => {
        try {
            const r = await fetch('/api/dreams');
            const d = await r.json();
            if (d.has_dreams) {
                const moon = document.getElementById('dream-moon');
                moon.textContent = ` \u{1F319} ${d.count}`;  // 🌙 N
                moon.hidden = false;
            }
        } catch (e) { /* dreams are a quiet thing; never disrupt the chat */ }
    })();

    // Load existing history on page load
    (async () => {
        const res = await fetch('/api/history?channel=tower');
        const data = await res.json();
        for (const msg of data.history || []) {
            appendMessage(msg.role, msg.text);
        }
        scrollToBottom();
    })();

    function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `msg msg-${role}`;
        const label = role === 'user' ? 'You' : ASSISTANT_LABEL;
        div.innerHTML = `<strong>${label}</strong><div class="msg-text">${escapeHtml(text)}</div>`;
        chatLog.appendChild(div);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function scrollToBottom() {
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage(e);
        }
    }

    async function sendMessage(e) {
        e.preventDefault();
        const message = chatInput.value.trim();
        if (!message) return;

        appendMessage('user', message);
        chatInput.value = '';
        sendBtn.disabled = true;
        sendBtn.textContent = 'Thinking...';
        scrollToBottom();

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message}),
            });
            const data = await res.json();
            if (data.error) {
                appendMessage('assistant', `[Error] ${data.error}`);
            } else {
                appendMessage('assistant', data.response);
            }
        } catch (err) {
            appendMessage('assistant', `[Error] ${err.message}`);
        } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = 'Send';
            scrollToBottom();
        }
    }

    async function clearChat() {
        if (!confirm('Clear conversation history?')) return;
        await fetch('/api/clear', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({channel: 'tower'}),
        });
        chatLog.innerHTML = '';
    }
    </script>
</body>
</html>
