# Galadriel — the easy button.
#
#   cp .env.example .env      # fill in ANTHROPIC_API_KEY + DISCORD_BOT_TOKEN
#   docker compose up -d --build
#   docker compose logs -f
#
# First boot, seed the memory palace once (otherwise palace_* tools report
# "palace unavailable" until there is something to search):
#   docker compose exec galadriel mempalace init
#   docker compose exec galadriel mempalace mine    # optional: index your config/ + memory/

services:
  galadriel:
    build: .
    image: galadriel:latest
    container_name: galadriel
    env_file: .env
    ports:
      # SECURITY: the Tower UI has NO authentication. It is bound to localhost
      # only. Do NOT change this to "8080:8080" (which listens on 0.0.0.0) on a
      # public server — put an authenticated reverse proxy or SSH tunnel in front.
      - "127.0.0.1:8080:8080"
    volumes:
      - palace:/data                 # memory palace + archive (persists)
      - ./memory:/app/memory         # daily memory logs (visible on host)
      - ./config:/app/config         # scheduler/ambient state + active_vision
    restart: unless-stopped

volumes:
  palace:
